<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="anima-title">
  <title id="anima-title">Anima Logo</title>
  <defs>
    <linearGradient id="anima-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="anima-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#EDE9FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Head circle -->
  <circle cx="256" cy="196" r="100" fill="none" stroke="url(#anima-grad)" stroke-width="28"/>
  <!-- Inner glow -->
  <circle cx="256" cy="196" r="80" fill="url(#anima-glow)"/>
  <!-- Consciousness dot -->
  <circle cx="256" cy="176" r="20" fill="url(#anima-grad)"/>
  <circle cx="252" cy="172" r="6" fill="#DDD6FE" opacity="0.7"/>
  <!-- Body curve -->
  <path d="M180,320 Q180,440 256,440 Q332,440 332,320"
    fill="none" stroke="url(#anima-grad)" stroke-width="28" stroke-linecap="round"/>
</svg>